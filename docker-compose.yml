version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: kryptos-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - kryptos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Redis NOT exposed to host — internal only

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: production
    container_name: kryptos-backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    networks:
      - kryptos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Backend NOT exposed to host — nginx proxies to it

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: production
    container_name: kryptos-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - kryptos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kryptos:
    driver: bridge
    name: kryptos-network

volumes:
  redis_data:
    name: kryptos-redis-data
